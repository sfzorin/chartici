name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure SSH
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Deploy files to VPS
        run: |
          set -euo pipefail
          rsync -az \
            -e "ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new" \
            src public samples index.html package.json package-lock.json vite.config.js Dockerfile nginx.conf docker-compose.yml deploy .dockerignore backend \
            deploy@${{ secrets.VPS_HOST }}:/opt/chartici/

      - name: Rebuild & restart containers
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: deploy
          key: ${{ secrets.VPS_SSH_KEY }}
          timeout: 2m
          command_timeout: 20m
          script: |
            cd /opt/chartici
            docker compose build --no-cache
            docker compose up -d chartici api
            docker network connect chartici_internal caddy-proxy 2>/dev/null || true
            docker image prune -f
            echo "✅ Deployed at $(date)"
