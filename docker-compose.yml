services:
  chartici:
    build: .
    container_name: chartici-web
    restart: unless-stopped
    ports:
      - "8090:80"
    networks:
      - internal

  api:
    build: ./backend
    container_name: chartici-api
    restart: unless-stopped
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - PORT=3001
    networks:
      - internal

networks:
  internal:
    driver: bridge
