<svg width="100%" height="100%" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <mask id="hollow-nodes">
      <rect width="120" height="120" fill="white" />
      <circle cx="85" cy="90" r="11" fill="black" />
      <circle cx="25" cy="65" r="11" fill="black" />
      <circle cx="60" cy="30" r="11" fill="black" />
    </mask>
  </defs>
  <g mask="url(#hollow-nodes)">
    <!-- Arc from bottom-right via left to top -->
    <path d="M 85 90 A 35 35 0 0 1 25 65 A 35 35 0 0 1 60 30 L 85 30" stroke="#BD355D" stroke-width="12" stroke-linecap="round" fill="none" />
    <!-- Solid circles masked into rings -->
    <circle cx="85" cy="90" r="17" fill="#BD355D" />
    <circle cx="25" cy="65" r="17" fill="#BD355D" />
    <circle cx="60" cy="30" r="17" fill="#BD355D" />
    <!-- Arrowhead -->
    <polygon points="80,15 110,30 80,45" fill="#BD355D" />
  </g>
</svg>